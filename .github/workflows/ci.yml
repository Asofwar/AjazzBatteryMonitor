name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.423
      - name: Restore locked dependencies
        run: dotnet restore AjazzBattery.sln --locked-mode
      - name: Build
        run: dotnet build AjazzBattery.sln --configuration Release --no-restore
      - name: Test non-hardware suites
        run: dotnet test AjazzBattery.sln --configuration Release --no-build --filter "Category!=Hardware" --collect:"XPlat Code Coverage" --results-directory TestResults
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: error
