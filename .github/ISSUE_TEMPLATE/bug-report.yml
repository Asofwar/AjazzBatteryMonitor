name: Bug report
description: Report a reproducible problem
body:
  - type: markdown
    attributes:
      value: Do not publish Bluetooth MAC addresses, serial numbers, full BLE IDs, complete HID paths, logs or local paths.
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
    validations:
      required: true
